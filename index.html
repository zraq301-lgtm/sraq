<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>تطبيق رقة - النسخة النسائية</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* إعدادات أساسية لضمان عدم حدوث فراغات بيضاء وتناسق الخطوط */
        body {
            margin: 0;
            padding: 0;
            background-color: #fcfcfc;
            font-family: 'Tajawal', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        #root {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* تنسيق زر التحميل الثابت في صفحة الهبوط */
        .download-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: fixed;
            bottom: 30px;
            width: 100%;
            z-index: 999;
        }

        .btn-download {
            background: linear-gradient(45deg, #d4a373, #faedcd); /* ألوان أنيقة تناسب رقة */
            color: #582f0e;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-download:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div id="root">
        </div>

    <div class="download-container">
        <a href="https://github.com/zraq301-lgtm/raqqa/releases/latest/download/Roqa-Final-Signed.apk" class="btn-download">
            <span>تحميل تطبيق رقة (أحدث إصدار)</span>
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
                <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
            </svg>
        </a>
    </div>

    <script type="module" src="/src/main.jsx"></script>

</body>
</html>
